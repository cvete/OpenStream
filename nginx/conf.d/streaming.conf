# Cloudflare IP ranges — use real visitor IP behind proxy
# IPv4 (https://www.cloudflare.com/ips-v4/)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# IPv6 (https://www.cloudflare.com/ips-v6/)
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# Upstream definitions
upstream api_backend {
    server api:3000;
    keepalive 32;
}

upstream srs_backend {
    server srs:8080;
    keepalive 32;
}

# Rate limiting zones
limit_conn_zone $binary_remote_addr zone=stream_conn:10m;
limit_req_zone $binary_remote_addr zone=stream_req:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_req:10m rate=10r/s;

# Valid referer mapping - CUSTOMIZE WITH YOUR DOMAINS
map $http_referer $valid_referer {
    default                           0;
    ""                                1;  # Allow direct access (for players)
    "~^https?://localhost"            1;  # Development
    "~^https?://127\.0\.0\.1"         1;  # Development
    # Add your production domains below:
    # "~^https://yourcompany\.com"      1;
    # "~^https://.*\.yourcompany\.com"  1;
}

# CORS origin mapping - CUSTOMIZE WITH YOUR DOMAINS
map $http_origin $cors_origin {
    default "";
    "~^https?://localhost(:\d+)?$" $http_origin;
    "~^https?://127\.0\.0\.1(:\d+)?$" $http_origin;
    # Add your production domains below:
    # "~^https://yourcompany\.com$" $http_origin;
    # "~^https://.*\.yourcompany\.com$" $http_origin;
}

server {
    listen 80;
    server_name _;

    # NOTE: No HTTP→HTTPS redirect needed here. Cloudflare handles
    # HTTPS termination and redirects at the edge. NGINX only sees HTTP.

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # LIVE STREAMING - HLS/DASH with Security
    # ============================================
    location /live/ {
        # Rate limiting
        limit_conn stream_conn 10;
        limit_req zone=stream_req burst=50 nodelay;

        # Serve HLS/DASH from media directory
        alias /media/live/;

        # CORS headers
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Origin, Accept" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

        # Cache control for live streams
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;

        # MIME types for streaming
        types {
            application/vnd.apple.mpegurl m3u8;
            application/dash+xml mpd;
            video/mp2t ts;
            video/mp4 mp4 m4s;
        }

        # Handle OPTIONS for CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range, Origin, Accept";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type "text/plain charset=UTF-8";
            add_header Content-Length 0;
            return 204;
        }
    }

    # ============================================
    # VOD STREAMING with Security
    # ============================================
    location /vod/ {
        # Token validation
        auth_request /internal/validate-token;
        auth_request_set $auth_status $upstream_status;

        # Referer check
        if ($valid_referer = 0) {
            return 403;
        }

        # Rate limiting
        limit_conn stream_conn 5;
        limit_req zone=stream_req burst=30 nodelay;

        alias /media/vod/;

        # CORS headers
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

        # Enable range requests for seeking
        add_header Accept-Ranges bytes;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
            video/mp4 mp4;
            video/x-flv flv;
        }
    }

    # ============================================
    # Internal Token Validation Endpoint
    # ============================================
    location = /internal/validate-token {
        internal;
        proxy_pass http://api_backend/api/internal/validate-token;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Cache successful validations briefly
        proxy_cache_valid 200 10s;
    }

    # ============================================
    # Secure Embed Player
    # ============================================
    location /embed/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Referer $http_referer;
    }

    # ============================================
    # API Endpoints
    # ============================================
    location /api/ {
        # Rate limiting for API
        limit_req zone=api_req burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============================================
    # SRS Statistics (protected)
    # ============================================
    location /srs/ {
        # Only allow from internal/admin
        auth_request /internal/validate-admin;

        proxy_pass http://srs_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /internal/validate-admin {
        internal;
        proxy_pass http://api_backend/api/internal/validate-admin;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
    }

    # ============================================
    # Web Dashboard (Static Files)
    # ============================================
    location / {
        root /var/www/dashboard;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ============================================
    # Error Pages
    # ============================================
    error_page 403 /403.html;
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /403.html {
        internal;
        return 403 '{"error": "Access denied", "code": 403}';
        add_header Content-Type application/json;
    }

    location = /50x.html {
        internal;
        return 500 '{"error": "Server error", "code": 500}';
        add_header Content-Type application/json;
    }
}

# NOTE: SSL/TLS is terminated by Cloudflare. Set Cloudflare SSL mode to "Full".
# NGINX only listens on port 80; Cloudflare handles HTTPS for clients.
# To restrict access to Cloudflare IPs only (block direct VPS access),
