# SRS Configuration for Streaming Server
# Documentation: https://ossrs.io/lts/en-us/docs/v5/doc/getting-started

listen              1935;
max_connections     5000;
daemon              off;
srs_log_tank        console;
srs_log_level       info;

# HTTP API for management
http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

# HTTP Server for HLS delivery (internal, NGINX handles public)
http_server {
    enabled         on;
    listen          8080;
    dir             /media/live;
    crossdomain     on;
}

# Statistics
stats {
    network         0;
}

# Main vhost configuration
vhost __defaultVhost__ {
    # TCP settings for performance
    tcp_nodelay     on;
    min_latency     on;

    # GOP cache for fast startup
    gop_cache       on;
    gop_cache_max_frames 2500;

    # Queue length
    queue_length    30;

    # HLS output
    hls {
        enabled         on;
        hls_path        /media/live;
        hls_fragment    2;
        hls_window      60;
        hls_m3u8_file   [stream].m3u8;
        hls_ts_file     [stream]-[seq].ts;
        hls_cleanup     on;
        hls_dispose     30;
        hls_wait_keyframe on;
    }

    # DASH output (optional, alongside HLS)
    dash {
        enabled         off;
    }

    # DVR/Recording
    dvr {
        enabled         on;
        dvr_path        /media/vod/[stream]/[timestamp].flv;
        dvr_plan        session;
        dvr_duration    0;
        dvr_wait_keyframe on;
    }

    # HTTP Callbacks for stream events
    http_hooks {
        enabled         on;

        # Called when stream starts publishing
        on_publish      http://api:3000/api/hooks/publish;

        # Called when stream stops publishing
        on_unpublish    http://api:3000/api/hooks/unpublish;

        # Called when viewer connects
        on_play         http://api:3000/api/hooks/play;

        # Called when viewer disconnects
        on_stop         http://api:3000/api/hooks/stop;

        # Called when DVR recording is done
        on_dvr          http://api:3000/api/hooks/dvr;
    }

    # Play settings
    play {
        gop_cache       on;
        queue_length    30;
        mw_latency      100;
    }

    # Publish settings
    publish {
        mr              off;
        firstpkt_timeout 20000;
        normal_timeout  7000;
    }
}

# Transcoding vhost (optional - for ABR)
vhost transcode.local {
    transcode {
        enabled     on;
        ffmpeg      /usr/local/bin/ffmpeg;

        # 720p profile
        engine 720p {
            enabled         on;
            vcodec          libx264;
            vbitrate        2500;
            vfps            30;
            vwidth          1280;
            vheight         720;
            vthreads        4;
            vprofile        main;
            vpreset         medium;
            acodec          aac;
            abitrate        128;
            asample_rate    44100;
            achannels       2;
            output          rtmp://127.0.0.1:[port]/[app]_720p/[stream];
        }

        # 480p profile
        engine 480p {
            enabled         on;
            vcodec          libx264;
            vbitrate        1200;
            vfps            30;
            vwidth          854;
            vheight         480;
            vthreads        4;
            vprofile        main;
            vpreset         medium;
            acodec          aac;
            abitrate        96;
            asample_rate    44100;
            achannels       2;
            output          rtmp://127.0.0.1:[port]/[app]_480p/[stream];
        }

        # 360p profile
        engine 360p {
            enabled         on;
            vcodec          libx264;
            vbitrate        600;
            vfps            25;
            vwidth          640;
            vheight         360;
            vthreads        2;
            vprofile        baseline;
            vpreset         fast;
            acodec          aac;
            abitrate        64;
            asample_rate    44100;
            achannels       2;
            output          rtmp://127.0.0.1:[port]/[app]_360p/[stream];
        }
    }
}
