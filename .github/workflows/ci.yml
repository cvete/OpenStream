name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: streaming_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: |
          cd api
          npm ci

      - name: Run database migrations
        run: |
          cd api
          npm run migrate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/streaming_test

      - name: Run unit tests
        run: |
          cd api
          npm run test:unit
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/streaming_test
          REDIS_URL: redis://localhost:6379/1
          JWT_SECRET: test-jwt-secret-32-characters-minimum-length-for-testing
          TOKEN_SECRET: test-token-secret-32-characters-minimum-length-testing
          NODE_ENV: test

      - name: Run integration tests
        run: |
          cd api
          npm run test:integration
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/streaming_test
          REDIS_URL: redis://localhost:6379/1
          JWT_SECRET: test-jwt-secret-32-characters-minimum-length-for-testing
          TOKEN_SECRET: test-token-secret-32-characters-minimum-length-testing
          NODE_ENV: test

      - name: Generate coverage report
        run: |
          cd api
          npm run test:coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/streaming_test
          REDIS_URL: redis://localhost:6379/1
          JWT_SECRET: test-jwt-secret-32-characters-minimum-length-for-testing
          TOKEN_SECRET: test-token-secret-32-characters-minimum-length-testing
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./api/coverage
          flags: unittests
          name: codecov-openstream
          fail_ci_if_error: false

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: |
          cd api
          npm ci

      - name: Run ESLint
        run: |
          cd api
          npm run lint

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run npm audit
        run: |
          cd api
          npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: |
          cd api
          npm ci

      - name: Build check
        run: |
          cd api
          echo "Build validation successful"

      - name: Deployment readiness check
        run: |
          cd api
          if [ -f "PRODUCTION_READINESS.md" ]; then
            echo "✅ Production readiness documentation exists"
          else
            echo "⚠️  Missing PRODUCTION_READINESS.md"
          fi

          if [ -f ".env.production.example" ]; then
            echo "✅ Production environment template exists"
          else
            echo "⚠️  Missing .env.production.example"
          fi

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, lint, security, build]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "🔍 CI Pipeline Summary:"
          echo "Tests: ${{ needs.test.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Build: ${{ needs.build.result }}"

          if [ "${{ needs.test.result }}" == "failure" ] || [ "${{ needs.lint.result }}" == "failure" ] || [ "${{ needs.build.result }}" == "failure" ]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          else
            echo "✅ CI Pipeline Passed"
          fi
